<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>agentserver</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: ui-monospace, monospace;
            background: #0d1117;
            color: #c9d1d9;
            height: 100vh;
            display: flex;
        }

        #sidebar {
            width: 240px;
            background: #161b22;
            border-right: 1px solid #30363d;
            display: flex;
            flex-direction: column;
        }

        #sidebar header {
            padding: 12px;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #sidebar header h1 {
            font-size: 14px;
        }

        #sidebar button {
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        #sidebar button:hover {
            background: #30363d;
        }

        #chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .chat-item {
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 4px;
            font-size: 13px;
        }

        .chat-item:hover {
            background: #21262d;
        }

        .chat-item.active {
            background: #1f6feb;
            color: #fff;
        }

        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            overflow: hidden;
        }

        #topbar {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 8px 12px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        #topbar select {
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 13px;
        }

        #topbar label {
            font-size: 12px;
            color: #8b949e;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .msg {
            margin-bottom: 12px;
            max-width: 80%;
            min-width: 0;
        }

        .msg.user {
            margin-left: auto;
        }

        .msg .role {
            font-size: 11px;
            color: #8b949e;
            margin-bottom: 2px;
        }

        .msg .bubble {
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-word;
            max-width: 100%;
            min-width: 0;
            overflow-wrap: anywhere;
        }

        .msg.user .bubble {
            background: #1f6feb;
            color: #fff;
        }

        .msg.assistant .bubble {
            background: #21262d;
            border: 1px solid #30363d;
        }

        .msg.tool .bubble {
            background: #161b22;
            border: 1px solid #30363d;
            font-family: monospace;
            font-size: 12px;
        }

        .msg.tool_call .bubble {
            background: #1a2332;
            border: 1px solid #1f6feb;
            font-family: monospace;
            font-size: 12px;
            color: #79c0ff;
        }

        .bubble h3 {
            font-size: 12px;
            color: #8b949e;
            margin: 4px 0 2px;
        }

        .bubble pre {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 4px;
            padding: 8px;
            overflow-x: auto;
            max-width: 100%;
            min-width: 0;
            margin: 4px 0;
        }

        .bubble pre code {
            font-family: ui-monospace, monospace;
            font-size: 12px;
            white-space: pre;
            display: block;
            min-width: 0;
        }

        .bubble code {
            font-family: ui-monospace, monospace;
            font-size: 12px;
            background: #0d1117;
            padding: 1px 4px;
            border-radius: 3px;
        }

        .bubble p {
            margin: 2px 0;
        }

        .bubble strong {
            color: #c9d1d9;
        }

        .msg.assistant-done .bubble {
            background: #21262d;
            border: 1px solid #30363d;
        }

        .msg.error .bubble {
            background: #4a1e1e;
            border: 1px solid #f85149;
            color: #f85149;
        }

        #compose {
            display: flex;
            gap: 8px;
            padding: 12px;
            border-top: 1px solid #30363d;
            background: #161b22;
        }

        #compose input {
            flex: 1;
            background: #0d1117;
            color: #c9d1d9;
            border: 1px solid #30363d;
            border-radius: 4px;
            padding: 8px;
            font-size: 13px;
        }

        #compose button {
            background: #1f6feb;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 13px;
        }

        #compose button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .empty {
            color: #8b949e;
            text-align: center;
            margin-top: 40px;
            font-size: 13px;
        }

        #providers-config {
            padding: 12px;
            border-top: 1px solid #30363d;
            font-size: 12px;
        }

        #providers-config h2 {
            font-size: 12px;
            margin-bottom: 8px;
            color: #8b949e;
        }

        #providers-config input {
            width: 100%;
            background: #0d1117;
            color: #c9d1d9;
            border: 1px solid #30363d;
            border-radius: 4px;
            padding: 4px;
            margin-bottom: 4px;
            font-size: 12px;
        }

        #providers-list {
            max-height: 120px;
            overflow-y: auto;
        }

        .provider-row {
            display: flex;
            justify-content: space-between;
            padding: 2px 0;
        }

        .provider-row button {
            background: none;
            border: none;
            color: #f85149;
            cursor: pointer;
            padding: 0 4px;
        }
    </style>
</head>

<body>
    <div id="sidebar">
        <header>
            <h1>chats</h1>
            <button id="new-chat">+ new</button>
        </header>
        <div id="chat-list"></div>
        <div id="providers-config">
            <h2>providers</h2>
            <div id="providers-list"></div>
            <input id="prov-name" placeholder="name">
            <input id="prov-base" placeholder="base url">
            <input id="prov-key" placeholder="api key" type="password">
            <button id="add-prov" style="width:100%;margin-top:4px;">add provider</button>
        </div>
    </div>
    <div id="main">
        <div id="topbar">
            <label>agent:</label>
            <select id="agent-select"></select>
            <label>provider:</label>
            <select id="provider-select"></select>
            <label>model:</label>
            <select id="model-select"></select>
        </div>
        <div id="messages"></div>
        <div id="compose">
            <input id="msg-input" placeholder="send a message..." disabled>
            <button id="send-btn" disabled>send</button>
        </div>
    </div>
    <script type="module" src="/app.js"></script>
</body>

</html>
